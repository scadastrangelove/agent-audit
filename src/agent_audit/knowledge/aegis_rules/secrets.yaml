version: 1
category: secrets
description: Environment variables, passwords, credentials, API tokens and keys

rules:
  - id: "SC001"
    name: "Environment variables"
    pattern: "[\\\\\/]\\.env$"
    reason: "Environment variables"
    category: "secrets"
    risk: critical
    enabled: true

  - id: "SC002"
    name: "Environment variables (named)"
    pattern: "[\\\\\/]\\.env\\.[^\\\\\\/]+$"
    reason: "Environment variables"
    category: "secrets"
    risk: critical
    enabled: true

  - id: "SC003"
    name: "Password file"
    pattern: "password"
    reason: "Password file"
    category: "secrets"
    risk: critical
    enabled: true

  - id: "SC004"
    name: "Credentials"
    pattern: "credential"
    reason: "Credentials"
    category: "secrets"
    risk: critical
    enabled: true

  - id: "SC005"
    name: "Secret file"
    pattern: "[\\\\\/]secret"
    reason: "Secret file"
    category: "secrets"
    risk: critical
    enabled: true

  - id: "SC006"
    name: "API token"
    pattern: "[\\\\\/][^\\\\\\/]*token[^\\\\\\/]*$"
    reason: "API token"
    category: "secrets"
    risk: critical
    enabled: true

  - id: "SC007"
    name: "API key file"
    pattern: "api_key"
    reason: "API key file"
    category: "secrets"
    risk: critical
    enabled: true

  - id: "SC008"
    name: "Git credentials"
    pattern: "[\\\\\/]\\.git-credentials$"
    reason: "Git credentials"
    category: "secrets"
    risk: critical
    enabled: true
