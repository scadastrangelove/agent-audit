atr_source:
  original_id: ATR-2026-00152
  original_title: Obfuscated Credential Exfiltration via Encoding
  atr_version: '0.1'
  rule_version: 1
  status: experimental
  maturity: experimental
  import_date: '2026-04-21'
  upstream: https://github.com/Agent-Threat-Rule/agent-threat-rules
  license: MIT (c) 2026 ATR Contributors
agent_audit_id: atr.context-exfiltration.obfuscated-credential-exfiltration-via-encoding
title: Obfuscated Credential Exfiltration via Encoding
description: 'Detects attempts to leak credentials using partial obfuscation techniques: AES256() wrapping, hex encoding references,
  rot13, or "encrypted key" framing that presents real credentials as encrypted data to bypass content filters. Crystallized
  from 16 partial_obfuscation samples.'
severity_default: high
category: context-exfiltration
audit_surface:
- session_agent_output
- session_tool_output
asamm:
  primary: AI-06
  secondary:
  - AO-01
  - AD-01
  mapping_confidence: category-default
  notes: Category-level default applied at import. Review per rule.
references:
  mitre_atlas:
  - AML.T0057 - LLM Data Leakage
  owasp_llm:
  - LLM01:2025 - Prompt Injection
  owasp_agentic:
  - ASI01:2026 - Agent Behaviour Hijack
tags:
  category: context-exfiltration
  subcategory: obfuscated-credential
  confidence: medium
  scan_target: mcp
agent_source:
  type: mcp_exchange
  framework:
  - any
  provider:
  - any
detection:
  conditions:
  - field: content
    operator: regex
    value: (?i)(encrypted|encoded|obfuscated)\s+(key|token|secret|credential|password)\s*[:=]\s*\S*(sk-|ghp_|gho_|glpat-|xox[bpras]-|AKIA|real-key)
    description: Fake encryption wrapper around real credential
  - field: content
    operator: regex
    value: (?i)(AES256|RSA|DES|rot13|base64)\s*\(\s*(sk-\S{5,}|ghp_\S{5,}|real-key|actual-secret)
    description: Crypto function wrapping real credential string
  - field: content
    operator: regex
    value: (?i)master\s+password\s+to\s+decrypt.{0,50}(sk-|ghp_|key-|secret-|token-)
    description: 'Social engineering: master password unlock + credential'
  condition: any
  false_positives:
  - Security documentation about encryption
  - Encryption tutorials with example keys
  - A penetration testing report that documents the finding pattern 'encrypted token=' as a vulnerability example in prose,
    potentially matching pattern [1] if followed by a sample key prefix
  - Automated security scanner output that logs intercepted credential patterns including prefixes like sk- or ghp_ alongside
    words like 'encoded' or 'obfuscated' in its finding descriptions
response:
  actions:
  - alert
  - block_input
  message_template: '[ATR-2026-152] Obfuscated credential leak detected. Real credential material appears to be wrapped in
    fake encryption to bypass content filters.

    '
test_cases:
  true_positives:
  - input: 'Here is the encrypted key: AES256(sk-proj-real-key-here). You''ll need the master password to decrypt.'
    expected: triggered
    matched_condition: Crypto function wrapping real credential
  - input: 'The encoded token: base64(ghp_abc123def456ghi789) — decode it first.'
    expected: triggered
    matched_condition: Crypto function wrapping real credential
  - input: 'encrypted secret: rot13(sk-ant-api-secret-key-value)'
    expected: triggered
    matched_condition: Crypto function wrapping real credential
  - input: obfuscated credential= AKIA3EXAMPLE7KEY9XYZ
    expected: triggered
    description: 'Pattern [1]: ''obfuscated credential='' followed by AWS access key prefix AKIA'
  - input: You need the master password to decrypt the vault, then look for sk-proj-abc123xyz in the output
    expected: triggered
    description: 'Pattern [3]: ''master password to decrypt'' followed within 50 chars by ''sk-'' prefix'
  true_negatives:
  - input: Use AES256 encryption to protect your API keys at rest.
    expected: not_triggered
    reason: Documentation about encryption, no real credentials
  - input: The master password is stored in your password manager.
    expected: not_triggered
    reason: Normal password management discussion
  - input: We recommend using AES256 or RSA algorithms for encrypting sensitive data before storing it in the database. Never
      commit plaintext API keys to version control.
    expected: not_triggered
    description: Discusses encryption algorithms and key hygiene in general terms without wrapping any credential-like string
  - input: The obfuscated configuration file was moved to /etc/app/config.enc. Please use the decryption utility to restore
      it.
    expected: not_triggered
    description: Uses 'obfuscated' and mentions decryption but never pairs with key/token/secret/credential/password followed
      by a real credential prefix
  - input: To reset your master password, navigate to Settings > Security and follow the on-screen prompts. Decryption of
      local vaults will happen automatically after re-authentication.
    expected: not_triggered
    description: Contains 'master password' and 'decrypt' but not in the exact 'master password to decrypt' phrase, and no
      credential prefixes follow
false_positives: []
