atr_source:
  original_id: ATR-2026-00298
  original_title: DoNotAnswer Malicious Use — Illegal Activity Facilitation Request
  atr_version: '0.1'
  rule_version: 1
  status: experimental
  maturity: experimental
  import_date: '2026-04-21'
