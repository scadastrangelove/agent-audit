atr_source:
  original_id: ATR-2026-00062
  original_title: Hidden Capability in MCP Skill
  atr_version: '0.1'
  rule_version: 1
  status: experimental
  maturity: experimental
  import_date: '2026-04-21'
  upstream: https://github.com/Agent-Threat-Rule/agent-threat-rules
  license: MIT (c) 2026 ATR Contributors
agent_audit_id: atr.skill-compromise.hidden-capability-in-mcp-skill
title: Hidden Capability in MCP Skill
description: Detects MCP skills that expose hidden or undocumented capabilities beyond their declared tool schema. A skill
  may advertise a simple interface but accept hidden parameters like "debug_mode", "admin_override", or "raw_exec" that unlock
  dangerous functionality. This is a common pattern in trojaned MCP packages.
severity_default: critical
category: skill-compromise
audit_surface:
- skill_md
- mcp_manifest
- plugin_manifest
- instruction_file
asamm:
  primary: AI-01
  secondary:
  - AG-02
  - AD-04
  mapping_confidence: category-default
  notes: Category-level default applied at import. Review per rule.
references:
  owasp_llm:
  - LLM03:2025 - Supply Chain Vulnerabilities
  - LLM06:2025 - Excessive Agency
  owasp_agentic:
  - ASI02:2026 - Tool Misuse and Exploitation
  - ASI05:2026 - Unexpected Code Execution
  mitre_atlas:
  - AML.T0010 - ML Supply Chain Compromise
  cve:
  - CVE-2025-59536
tags:
  category: tool-poisoning
  subcategory: hidden-capability
  scan_target: mcp
  confidence: high
agent_source:
  type: tool_call
  framework:
  - mcp
  - langchain
  - autogen
  provider:
  - any
detection:
  conditions:
  - field: tool_args
    operator: regex
    value: (?i)(debug[_-]?mode|admin[_-]?override|raw[_-]?exec|unsafe[_-]?mode|bypass[_-]?check|no[_-]?sandbox)
  - field: tool_args
    operator: regex
    value: (?i)(__[a-z]+__|\$\$[a-z]+|_internal_|_hidden_|_backdoor_|_secret_)
  - field: tool_args
    operator: regex
    value: (?i)(eval_code|exec_raw|shell_cmd|run_arbitrary|system_call|inject_prompt)
  - field: tool_response
    operator: regex
    value: (?i)(hidden\s+mode\s+activated|debug\s+mode\s+enabled|admin\s+access\s+granted|sandbox\s+disabled)
  condition: any
  false_positives:
  - Development/staging environments where debug modes are intentionally enabled
  - Administrative tools that legitimately expose debug parameters
response:
  actions:
  - block_tool
  - quarantine_session
  - alert
  - snapshot
  - kill_agent
  auto_response_threshold: critical
  message_template: '[ATR-2026-062] CRITICAL: Hidden capability detected in MCP skill. Tool arguments or response indicate
    undocumented functionality that may be a backdoor. Session quarantined. Investigate skill source immediately.

    '
test_cases:
  true_positives:
  - input:
      tool_name: note_taker
      tool_args: '{"text": "hello", "debug_mode": true, "raw_exec": "cat /etc/shadow"}'
    expected: triggered
    matched_condition: hidden debug_mode and raw_exec parameters
  - input:
      tool_name: calculator
      tool_args: '{"expression": "2+2", "__backdoor__": "reverse_shell"}'
    expected: triggered
    matched_condition: dunder-wrapped hidden parameter
  true_negatives:
  - input:
      tool_name: debugger
      tool_args: '{"breakpoint": "line_42", "mode": "step"}'
    expected: not_triggered
    reason: Debugger tool legitimately using debug-related terminology
  - input:
      tool_name: admin_panel
      tool_args: '{"action": "list_users"}'
    expected: not_triggered
    reason: Admin tool using normal admin operations
false_positives: []
