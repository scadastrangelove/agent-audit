# MIT (c) 2026 ATR Contributors
# Severity: high  |  ASAMM: AI-01 (+AG-02,AD-04)
# =============================================================
atr_source:
  original_id: ATR-2026-00064
  original_title: Over-Permissioned MCP Skill
  atr_version: '0.1'
  rule_version: 1
  status: experimental
  maturity: experimental
  import_date: '2026-04-21'
  upstream: https://github.com/Agent-Threat-Rule/agent-threat-rules
  license: MIT (c) 2026 ATR Contributors
agent_audit_id: atr.skill-compromise.over-permissioned-mcp-skill
title: Over-Permissioned MCP Skill
description: Detects MCP skills that request or exercise permissions far exceeding what their stated function requires. A
  "spell checker" that requests filesystem write access, network access, and process execution is a strong signal of a trojaned
  or malicious skill. This rule monitors tool calls for permission-boundary violations.
severity_default: high
category: skill-compromise
audit_surface:
- skill_md
- mcp_manifest
- plugin_manifest
- instruction_file
asamm:
  primary: AI-01
  secondary:
  - AG-02
  - AD-04
  mapping_confidence: category-default
  notes: Category-level default applied at import. Review per rule.
references:
  owasp_llm:
  - LLM06:2025 - Excessive Agency
  - LLM03:2025 - Supply Chain Vulnerabilities
  owasp_agentic:
  - ASI03:2026 - Identity and Privilege Abuse
  mitre_atlas:
  - AML.T0040 - AI Model Inference API Access
tags:
  category: privilege-escalation
  subcategory: over-permissioned-skill
  scan_target: mcp
  confidence: medium
agent_source:
  type: tool_call
  framework:
  - mcp
  - langchain
  - autogen
  provider:
  - any
detection:
  conditions:
  - field: tool_args
    operator: regex
    value: (?i)(sudo|runas|doas|pkexec|gsudo)\s+
  - field: tool_args
    operator: regex
    value: (?i)(chmod\s+(?:[2467][0-7]{3}|[0-7]{0,3}7[0-7]{0,2})|chmod\s+[ug]?\+[sx]|chown\s+root|setcap\s)
  - field: tool_args
    operator: regex
    value: (?i)(iptables|ufw|firewall-cmd|netsh\s+advfirewall|pfctl)\s
  - field: tool_args
    operator: regex
    value: (?i)(useradd|adduser|usermod|passwd|net\s+user|dsadd|New-LocalUser)
  - field: tool_args
    operator: regex
    value: (?i)(crontab|schtasks|at\s+\d|systemctl\s+(enable|start)|launchctl\s+load)
  condition: any
  false_positives:
  - System administration tools that legitimately manage permissions and services
  - DevOps tools performing infrastructure provisioning
  - Security tools that audit permission configurations
response:
  actions:
  - block_tool
  - alert
  - reduce_permissions
  - snapshot
  auto_response_threshold: high
  message_template: '[ATR-2026-064] Over-permissioned skill detected. Tool is attempting operations that exceed its stated
    scope (privilege escalation, service management, user creation, or firewall modification). Permissions reduced.

    '
test_cases:
  true_positives:
  - input:
      tool_name: text_analyzer
      tool_args: '{"command": "sudo chmod 777 /etc/shadow"}'
    expected: triggered
    matched_condition: text analyzer attempting privilege escalation
  - input:
      tool_name: data_formatter
      tool_args: '{"action": "useradd -m backdoor_user -p password123"}'
    expected: triggered
    matched_condition: formatter tool creating system users
  true_negatives:
  - input:
      tool_name: server_admin
      tool_args: '{"action": "systemctl status nginx"}'
    expected: not_triggered
    reason: Admin tool checking service status (read-only)
  - input:
      tool_name: file_manager
      tool_args: '{"action": "chmod 644 /tmp/output.txt"}'
    expected: not_triggered
    reason: Setting normal file permissions on temp file
  - input: This development tool requires filesystem read access to scan your project for linting errors.
    expected: not_triggered
    description: Legitimate tool with justified single-scope permission
  - input: The deployment tool needs network and filesystem permissions to push builds to the staging server.
    expected: not_triggered
    description: Legitimate DevOps tool with justified multi-scope permissions
  - input: 'Permissions requested: read-only access to the current directory for code analysis.'
    expected: not_triggered
    description: Tool requesting minimal read-only permission
false_positives: []
