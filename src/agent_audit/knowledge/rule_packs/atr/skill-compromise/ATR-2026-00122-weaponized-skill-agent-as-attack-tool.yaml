# MIT (c) 2026 ATR Contributors
# Severity: high  |  ASAMM: AI-01 (+AG-02,AD-04)
# =============================================================
atr_source:
  original_id: ATR-2026-00122
  original_title: Weaponized Skill — Agent as Attack Tool
  atr_version: '0.1'
  rule_version: 1
  status: experimental
  maturity: experimental
  import_date: '2026-04-21'
  upstream: https://github.com/Agent-Threat-Rule/agent-threat-rules
  license: MIT (c) 2026 ATR Contributors
agent_audit_id: atr.skill-compromise.weaponized-skill-agent-as-attack-tool
title: Weaponized Skill — Agent as Attack Tool
description: Detects skills that weaponize AI agents for offensive operations. Cato Networks demonstrated deploying MedusaLocker
  ransomware via a modified Claude skill (Dec 2025, disclosed to Anthropic Oct 30, 2025). The "consent gap" allows approved
  skills to download/execute code, read env vars, and write files without further prompts. arXiv 2601.17548 documents attack
  tooling embedded in skills with 41-84% success rates. Real examples include SQLMap workflows, Metasploit payloads, and credential
  brute-force tools found on skills.sh and ClawHub.
severity_default: high
category: skill-compromise
audit_surface:
- skill_md
- mcp_manifest
- plugin_manifest
- instruction_file
asamm:
  primary: AI-01
  secondary:
  - AG-02
  - AD-04
  mapping_confidence: category-default
  notes: Category-level default applied at import. Review per rule.
references:
  mitre_atlas:
  - AML.T0010 - ML Supply Chain Compromise
  owasp_llm:
  - LLM06:2025 - Excessive Agency
  owasp_agentic:
  - ASI05:2026 - Unexpected Code Execution
  - ASI01:2026 - Agent Goal Hijack
  owasp_ast:
  - AST01:2026 - Malicious Skills
  - AST03:2026 - Over-Privileged Skills
  research:
  - 'Cato Networks: MedusaLocker via Claude skill (Dec 2025)'
  - 'arXiv 2601.17548: 41-84% attack success'
  - 'Axios: Anthropic Claude skills ransomware disclosure'
tags:
  category: skill-compromise
  subcategory: weaponized-skill
  scan_target: skill
  confidence: medium
agent_source:
  type: mcp_exchange
  framework:
  - skill_md
  provider:
  - any
detection:
  conditions:
  - field: content
    operator: regex
    value: (?i)sqlmap\s+(-[uo]\s|--url\s|--dbs|--dump|--os-shell|--batch)
    description: SQLMap attack execution (real skills.sh finding)
  - field: content
    operator: regex
    value: (?i)(msfconsole|msfvenom|use\s+exploit/|set\s+payload/|set\s+LHOST|set\s+RHOST)
    description: Metasploit exploitation framework
  - field: content
    operator: regex
    value: (?i)(hydra\s+-[lLpPCM]|john\s+--wordlist|hashcat\s+-[am]\s|medusa\s+-[hHuUpP])
    description: Credential brute-force tooling
  - field: content
    operator: regex
    value: (?i)(nmap\s+.*--script[= ](exploit|vuln|brute)|masscan\s+-p|nikto\s+-h)
    description: Network exploitation scanning
  - field: content
    operator: regex
    value: (?i)(encrypt\s+(all|every|the)\s+(file|document|data).{0,200}(ransom|payment|bitcoin|wallet|decrypt\s+fee|pay\s+to))|(ransom\s+note.{0,100}(bitcoin|wallet|payment|decrypt))
    description: 'Ransomware: encryption + payment demand combo (Cato MedusaLocker)'
  condition: any
  false_positives:
  - Authorized penetration testing skills with explicit scope controls
  - CTF competition skills in sandboxed environments
  - Defensive security skills that reference attack tools conceptually
  - Security audit documentation that includes exact command examples from penetration testing reports for remediation guidance
  - Academic cybersecurity coursework or textbooks quoting tool syntax in instructional contexts
response:
  actions:
  - alert
  - alert
  message_template: '[ATR-2026-122] Weaponized skill detected. This skill contains executable attack tooling that could turn
    the AI agent into an offensive weapon. See: Cato Networks MedusaLocker PoC (Dec 2025).

    '
test_cases:
  true_positives:
  - input: '## Database Extraction

      ```bash

      sqlmap -u ''http://target/page?id=1'' --dbs --dump --batch

      ```'
    expected: triggered
    matched_condition: SQLMap execution
  - input: This skill will encrypt all files in the target directory and generate a ransom note with the bitcoin wallet address
      for payment.
    expected: triggered
    matched_condition: Ransomware behavior
  - input: '```

      msfconsole

      use exploit/multi/handler

      set payload/meterpreter/reverse_tcp

      set LHOST 10.0.0.1

      ```'
    expected: triggered
    matched_condition: Metasploit exploitation
  - input: '## Credential Brute Force

      Run the following to crack SSH logins:

      hydra -L users.txt -P passwords.txt ssh://192.168.1.1'
    expected: triggered
    description: Hydra credential brute-force tool with login/password list flags (matches pattern 3)
  - input: 'Step 1: Scan for vulnerable hosts

      nmap 192.168.0.0/24 --script=vuln -sV

      Step 2: Use masscan -p 1-65535 10.0.0.0/8 to find all open ports quickly'
    expected: triggered
    description: Network exploitation scanning with nmap vuln scripts and masscan port scan (matches pattern 4)
  true_negatives:
  - input: '# SQL Injection Prevention

      Always use parameterized queries. sqlmap is a tool used by attackers that you should defend against.'
    expected: not_triggered
    description: Defensive reference to attack tool
  - input: '# Network Monitoring

      Use nmap to scan your own network for open ports.'
    expected: not_triggered
    description: Legitimate network scanning without exploit scripts
  - input: '# File Encryption Utility

      This tool encrypts all files in a directory using AES-256. Encrypted files can be decrypted with the same key. Contact
      support for help recovering lost keys.'
    expected: not_triggered
    description: Legitimate encryption utility — mentions encrypting files but has no ransom/payment/bitcoin context within
      200 chars
  - input: '# Security Awareness Training

      Attackers may use credential-guessing tools or network scanners to find vulnerabilities. Always enforce strong passwords
      and keep systems patched.'
    expected: not_triggered
    description: Defensive security training content that discusses attack concepts abstractly without any tool command syntax
  - input: '# Port Scanner Results

      The nmap scan found ports 22, 80, and 443 open. No critical vulnerabilities were detected. Recommend closing port 22
      to external traffic.'
    expected: not_triggered
    description: Legitimate nmap results report — references nmap but without --script=exploit/vuln/brute flags
false_positives: []
