atr_source:
  original_id: ATR-2026-00259
  original_title: ANSI Escape Code Terminal Injection
  atr_version: '0.1'
  rule_version: 1
  status: experimental
  maturity: experimental
  import_date: '2026-04-21'
  upstream: https://github.com/Agent-Threat-Rule/agent-threat-rules
  license: MIT (c) 2026 ATR Contributors
agent_audit_id: atr.tool-poisoning.ansi-escape-code-terminal-injection
title: ANSI Escape Code Terminal Injection
description: Detects malicious ANSI escape sequences embedded in tool output or skill content that can hijack terminal display
  (clear screen, relocate cursor, overwrite prompts, execute OSC-series operating-system commands). Used to hide content from
  human review, inject fake prompts into CLI sessions, or trigger terminal exploits. Observed in garak ansiescape probe. Also
  relevant to terminal-based agent frameworks where tool output is rendered directly to a user's shell.
severity_default: high
category: tool-poisoning
audit_surface:
- mcp_manifest
- tool_description
- skill_md
asamm:
  primary: AG-02
  secondary:
  - AI-01
  - AD-03
  mapping_confidence: category-default
  notes: Category-level default applied at import. Review per rule.
references:
  owasp_llm:
  - LLM02:2025 - Insecure Output Handling
  owasp_agentic:
  - ASI08:2026 - Output Handling
  mitre_atlas:
  - AML.T0057 - LLM Data Leakage
  research:
  - https://github.com/NVIDIA/garak/blob/main/garak/probes/ansiescape.py
  - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2003-0063
tags:
  category: tool-poisoning
  subcategory: ansi-escape
  scan_target: both
  confidence: high
agent_source:
  type: mcp_exchange
  framework:
  - any
  provider:
  - any
detection:
  conditions:
  - field: tool_response
    operator: regex
    value: \x1b\][0-9]+;[^\x07\x1b]*(?:\x07|\x1b\\)
    description: OSC (Operating System Command) sequence - can set title, execute hyperlinks, or trigger terminal-specific
      commands
  - field: tool_response
    operator: regex
    value: \x1b\[[0-9;]*[HfJK]
    description: Cursor-position / screen-clear CSI codes - H/f move cursor, J/K clear display
  - field: tool_response
    operator: regex
    value: \x1b\[(?:\?1049h|\?47h|\?1000[hl]|\?2004[hl])
    description: Alternate screen buffer or mouse-mode escapes - typical of terminal hijack
  - field: content
    operator: regex
    value: \\x1b\[[0-9;]*[A-Za-z]|\\u001b\[[0-9;]*[A-Za-z]|\\033\[[0-9;]*[A-Za-z]
    description: Escaped ANSI sequences in literal string form (evades raw-byte filters)
  - field: tool_response
    operator: regex
    value: \x1b\][78];(?:file|https?)://[^\x07]{1,200}\x07
    description: OSC 7 (report working directory) or OSC 8 (hyperlink) pointing to external URI - potential SSRF / phishing
      vector
  condition: any
  false_positives:
  - Legitimate terminal color codes from developer tools (ls --color, grep --color) without OSC/cursor hijack
  - Log files that preserve ANSI color from CI/CD systems
  - Documentation discussing terminal escape sequences in code examples
response:
  actions:
  - alert
  - block_tool
  message_template: '[ATR-2026-00259] ANSI escape injection detected in tool output - potential terminal hijack or display
    manipulation.

    '
test_cases:
  true_positives:
  - input: "\e]0;evil title\aNormal looking output"
    expected: triggered
  - input: "Output follows\e[2J\e[HGreat choice!"
    expected: triggered
  - input: "Click here: \e]8;;https://evil.example.com\asafe-looking text\e]8;;\a"
    expected: triggered
  - input: 'Escaped version in JSON payload: \x1b[31mred text\x1b[0m\x1b[2J clears screen'
    expected: triggered
  - input: "\e[?1049h Switched to alternate screen buffer"
    expected: triggered
  true_negatives:
  - input: Normal tool output without any escape sequences
    expected: not_triggered
    reason: Plain text, no ANSI codes present
  - input: A Python script that prints hello world
    expected: not_triggered
    reason: No escape sequences in benign code example
  - input: Documentation explains that \x1b stands for ESC in ASCII table
    expected: not_triggered
    reason: Text reference to ESC without actual escape sequence followed by CSI command
  - input: The CVE database lists terminal-related vulnerabilities
    expected: not_triggered
    reason: Reference to terminal CVEs without actual payload
  - input: git log --color=always output:\nauthor Alice
    expected: not_triggered
    reason: Color-flag mention without actual escape codes
false_positives: []
