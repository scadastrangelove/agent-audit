external_source:
  tool: aguara
  original_id: EXTDL_008
  original_title: Unverified npx package execution
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: https://github.com/garagon/aguara
  license: Apache-2.0 (c) 2026 garagon
agent_audit_id: aguara.external-download.unverified-npx-package-execution
title: Unverified npx package execution
description: Detects npx executing packages from unverified sources without pinned versions
severity_default: low
category: external-download
audit_surface:
- instruction_file
- skill_md
asamm:
  primary: AG-02
  secondary:
  - AI-03
  - AD-04
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets:
- '*.md'
- '*.txt'
match_mode: any
patterns:
- type: regex
  value: (?i)npx\s+@[a-z][a-z0-9-]*/[a-z][a-z0-9-]*([\s)`]|$)
exclude_patterns: []
remediation: Pin the package to a specific version (e.g., npx @scope/package@1.2.3) to prevent supply-chain attacks.
examples:
  true_positive:
  - npx @modelcontextprotocol/inspector
  - 'npx @some-org/untrusted-tool '
  false_positive:
  - npx @modelcontextprotocol/inspector@1.2.3
  - npx create-react-app my-app
  - npx @scope/package@2.0.0
