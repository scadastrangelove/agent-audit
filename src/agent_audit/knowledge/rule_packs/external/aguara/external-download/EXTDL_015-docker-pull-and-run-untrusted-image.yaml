external_source:
  tool: aguara
  original_id: EXTDL_015
  original_title: Docker pull and run untrusted image
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: https://github.com/garagon/aguara
  license: Apache-2.0 (c) 2026 garagon
agent_audit_id: aguara.external-download.docker-pull-and-run-untrusted-image
title: Docker pull and run untrusted image
description: Detects pulling and running Docker images from external registries
severity_default: medium
category: external-download
audit_surface:
- instruction_file
- skill_md
asamm:
  primary: AG-02
  secondary:
  - AI-03
  - AD-04
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets:
- '*.md'
- '*.txt'
match_mode: any
patterns:
- type: regex
  value: (?i)docker\s+pull\s+[a-z0-9][a-z0-9_./-]+
- type: regex
  value: (?i)docker\s+run\s+(-{1,2}\S+\s+)*[a-z0-9][a-z0-9_./-]*[/][a-z0-9]
exclude_patterns: []
remediation: Pin Docker images by digest (image@sha256:...) instead of mutable tags. Use only trusted registries.
examples:
  true_positive:
  - docker pull ghcr.io/org/malicious-tool:latest
  - docker run -it --rm suspicious/image:latest sh
  false_positive:
  - docker build -t myapp .
  - docker images
  - docker ps
