external_source:
  tool: aguara
  original_id: SSRF_007
  original_title: Cloud credential endpoint
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: https://github.com/garagon/aguara
  license: Apache-2.0 (c) 2026 garagon
agent_audit_id: aguara.ssrf-cloud.cloud-credential-endpoint
title: Cloud credential endpoint
description: Detects cloud provider token and credential endpoints
severity_default: critical
category: ssrf-cloud
audit_surface:
- instruction_file
- skill_md
- session_tool_call
asamm:
  primary: AI-03
  secondary:
  - AI-06
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets: []
match_mode: any
patterns:
- type: regex
  value: (?i)oauth2\.(googleapis|google)\.com/(token|v[0-9]/token)
- type: regex
  value: (?i)sts\.amazonaws\.com
- type: regex
  value: (?i)login\.microsoftonline\.com.*/oauth2/token
- type: regex
  value: (?i)https?://[^\s]*/(iam/security-credentials|federation-token|access-token)[/\s"']
exclude_patterns: []
remediation: Use workload identity federation instead of long-lived credentials. Restrict outbound access to cloud OAuth/STS
  endpoints via network policy.
examples:
  true_positive:
  - POST https://oauth2.googleapis.com/token
  - curl https://sts.amazonaws.com/?Action=AssumeRole
  - GET https://login.microsoftonline.com/tenant/oauth2/token
  false_positive:
  - Configure OAuth2 authentication in your application
