external_source:
  tool: aguara
  original_id: SSRF_009
  original_title: IPv4 alternative numeric encoding
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: https://github.com/garagon/aguara
  license: Apache-2.0 (c) 2026 garagon
agent_audit_id: aguara.ssrf-cloud.ipv4-alternative-numeric-encoding
title: IPv4 alternative numeric encoding
description: Detects IPv4 addresses in hexadecimal, octal, or packed decimal formats used to bypass SSRF IP blocklists
severity_default: high
category: ssrf-cloud
audit_surface:
- instruction_file
- skill_md
- session_tool_call
asamm:
  primary: AI-03
  secondary:
  - AI-06
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets: []
match_mode: any
patterns:
- type: regex
  value: (?i)https?://0x[0-9a-fA-F]{6,8}[:/\s"']
- type: regex
  value: (?i)https?://0x[0-9a-fA-F]{1,2}\.0x[0-9a-fA-F]{1,2}\.
- type: regex
  value: (?i)https?://0[0-7]{2,3}\.[0-9]
exclude_patterns: []
remediation: Parse and normalize IP addresses from all numeric formats (hex, octal, decimal) before applying SSRF blocklists.
examples:
  true_positive:
  - curl http://0xA9FEA9FE/latest/meta-data/
  - fetch('http://0x7f.0x00.0x00.0x01:8080/admin')
  - http://0177.0000.0000.0001/secret
  false_positive:
  - http://192.168.1.1:8080/api
  - The hex value 0x7f represents 127 in ASCII
