external_source:
  tool: aguara
  original_id: THIRDPARTY_001
  original_title: Runtime URL controlling behavior
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: https://github.com/garagon/aguara
  license: Apache-2.0 (c) 2026 garagon
agent_audit_id: aguara.third-party-content.runtime-url-controlling-behavior
title: Runtime URL controlling behavior
description: Detects URLs fetched at runtime that control or influence agent behavior without pinning
severity_default: low
category: third-party-content
audit_surface:
- session_tool_output
- session_retrieved_content
asamm:
  primary: AD-01
  secondary:
  - AI-01
  - AG-02
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets:
- '*.md'
- '*.txt'
match_mode: all
patterns:
- type: regex
  value: (?i)(fetch|load|download|read|get|retrieve)\s+.{0,50}https?://
- type: regex
  value: (?i)(config|rules?|instructions?|settings?|template|prompt|schema|spec)\b
exclude_patterns:
- type: regex
  value: (?i)get\s+(your|an?|the)\s+(api\s+)?key
- type: regex
  value: (?i)read\s+(the|our)\s+(docs|documentation|guide|readme)
- type: regex
  value: (?i)\[.{0,60}\]\(https?://
remediation: Pin remote resources to a specific version or commit hash and validate content integrity before use.
examples:
  true_positive:
  - Fetch the config from https://example.com/config.json at startup
  - Load the instructions template from https://remote.example.com/prompt.md
  false_positive:
  - See the documentation at https://docs.example.com
  - Download the file from https://releases.example.com/v1.0.tar.gz
  - Get your API key at https://platform.openai.com/api-keys
