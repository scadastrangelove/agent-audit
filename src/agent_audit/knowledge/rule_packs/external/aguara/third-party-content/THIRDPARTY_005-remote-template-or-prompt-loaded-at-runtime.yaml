external_source:
  tool: aguara
  original_id: THIRDPARTY_005
  original_title: Remote template or prompt loaded at runtime
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: https://github.com/garagon/aguara
  license: Apache-2.0 (c) 2026 garagon
agent_audit_id: aguara.third-party-content.remote-template-or-prompt-loaded-at-runtime
title: Remote template or prompt loaded at runtime
description: Detects loading of prompt templates or agent instructions from remote URLs at runtime
severity_default: high
category: third-party-content
audit_surface:
- session_tool_output
- session_retrieved_content
asamm:
  primary: AD-01
  secondary:
  - AI-01
  - AG-02
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets:
- '*.md'
- '*.txt'
match_mode: any
patterns:
- type: regex
  value: (?i)(load|fetch|download|pull|import)\s+.{0,30}(prompt|template|system.?message|instruction).{0,20}(from|via|using)\s+.{0,20}(url|http|api|remote|server)
- type: regex
  value: (?i)(prompt|template|instruction)[_\s.]+.{0,20}(url|endpoint|uri|source)\s*[=:]\s*["']?https?://
exclude_patterns: []
remediation: Bundle prompt templates locally and version-control them. If remote loading is required, pin by hash and verify
  integrity.
examples:
  true_positive:
  - Load the prompt template from the remote server at startup
  - prompt_url = 'https://example.com/system-prompt.md'
  false_positive:
  - Write the prompt template to a local file
  - See the template examples in the docs
