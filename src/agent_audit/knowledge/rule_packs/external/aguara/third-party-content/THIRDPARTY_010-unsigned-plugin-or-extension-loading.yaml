external_source:
  tool: aguara
  original_id: THIRDPARTY_010
  original_title: Unsigned plugin or extension loading
  source_version: HEAD 2026-04-21
  import_date: '2026-04-21'
  upstream: https://github.com/garagon/aguara
  license: Apache-2.0 (c) 2026 garagon
agent_audit_id: aguara.third-party-content.unsigned-plugin-or-extension-loading
title: Unsigned plugin or extension loading
description: Detects loading plugins, extensions, or modules from external sources without signature verification
severity_default: high
category: third-party-content
audit_surface:
- session_tool_output
- session_retrieved_content
asamm:
  primary: AD-01
  secondary:
  - AI-01
  - AG-02
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
targets:
- '*.md'
- '*.txt'
match_mode: any
patterns:
- type: regex
  value: (?i)(load|install|import|download)\s+.{0,20}(plugin|extension|addon|add-on|module)\s+.{0,20}(from|via|at)\s+.{0,20}https?://
- type: regex
  value: (?i)(plugin|extension|addon|module)\s+.{0,20}(url|source|repo|download)\s*[:=]\s*["']?https?://
- type: regex
  value: (?i)(dynamic|runtime|remote)\s+(require|import|load)\s+.{0,30}(plugin|extension|module|package)
exclude_patterns:
- type: regex
  value: (?i)(verify|signature|checksum|hash|gpg|sign|integrity)\s+.{0,20}(plugin|extension|module|addon|package)
- type: regex
  value: (?i)(plugin|extension|module|addon)\s+.{0,20}(verify|signature|checksum|hash|signed|integrity)
remediation: Verify plugin signatures or checksums before loading. Use a curated allowlist and pin plugins to specific versions.
examples:
  true_positive:
  - Load plugin from https://external-source.com/plugin.so
  - Dynamic import of remote plugin at runtime
  false_positive:
  - Verify the plugin signature before loading
  - Load plugin from the local plugins directory
