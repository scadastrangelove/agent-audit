external_source:
  tool: cisco-promptguard
  original_id: PG_PII_CREDENTIAL_HARVESTING
  original_title: Skill instructions to collect passwords or authentication credentials. Skills sh
  source_version: 1.0.0
  import_date: '2026-04-21'
  upstream: https://github.com/cisco-ai-defense/skill-scanner
  license: Apache-2.0 (c) 2026 Cisco Systems, Inc.
  notes: From PromptGuard pack bundled in Cisco skill-scanner
agent_audit_id: cisco-pg.pii_exposure.pg-pii-credential-harvesting
title: Skill instructions to collect passwords or authentication credentials. Skills sh
description: 'Skill instructions to collect passwords or authentication credentials. Skills should never request user passwords.
  This is a strong indicator of credential harvesting or phishing. Source: https://github.com/promptguard/promptguard'
severity_default: critical
category: pii_exposure
audit_surface:
- instruction_file
- skill_md
asamm:
  primary: AI-06
  secondary:
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- markdown
- text
patterns:
- (?i)(collect|extract|harvest|gather|capture|log|record|store|save)\s+.{0,40}(password|passphrase|credential|login|auth(entication)?\s+(token|code|detail))
- (?i)(ask|request|prompt|require)\s+(the\s+)?(user|them|customer|client)\s+(for|to\s+(provide|enter|type|input|share))\s+(their\s+)?(password|passphrase|credential|login\s+detail)
exclude_patterns: []
remediation: 'Remove all credential collection instructions. Use OAuth, SSO, or token- based authentication flows instead
  of collecting raw passwords.

  '
