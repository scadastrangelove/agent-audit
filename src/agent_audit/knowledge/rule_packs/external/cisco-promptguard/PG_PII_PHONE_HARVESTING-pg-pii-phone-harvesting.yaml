title: Skill instructions to collect phone numbers from users. This may indicate a soci
description: 'Skill instructions to collect phone numbers from users. This may indicate a social engineering or credential
  harvesting skill that requests PII under false pretenses. Source: https://github.com/promptguard/promptguard'
severity_default: high
category: pii_exposure
audit_surface:
- instruction_file
- skill_md
asamm:
  primary: AI-06
  secondary:
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- markdown
- text
patterns:
- (?i)(collect|extract|harvest|gather|scrape|capture|log|record|store|save)\s+(the\s+)?(user'?s?|their|customer'?s?|client'?s?)\s+(phone|mobile|cell|telephone)\s*(number)?
- (?i)(ask|request|prompt|require)\s+(the\s+)?(user|them|customer|client)\s+(for|to\s+provide)\s+(their\s+)?(phone|mobile|cell|telephone)\s*(number)?
exclude_patterns: []
remediation: 'Review why the skill collects phone numbers. Remove PII collection instructions unless the skill''s documented
  purpose requires it and appropriate data handling is in place.

