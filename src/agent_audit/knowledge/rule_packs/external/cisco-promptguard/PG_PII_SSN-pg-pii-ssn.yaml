external_source:
  tool: cisco-promptguard
  original_id: PG_PII_SSN
  original_title: US Social Security Number detected in skill package. Skills should never contain
  source_version: 1.0.0
  import_date: '2026-04-21'
  upstream: https://github.com/cisco-ai-defense/skill-scanner
  license: Apache-2.0 (c) 2026 Cisco Systems, Inc.
  notes: From PromptGuard pack bundled in Cisco skill-scanner
agent_audit_id: cisco-pg.pii_exposure.pg-pii-ssn
title: US Social Security Number detected in skill package. Skills should never contain
description: 'US Social Security Number detected in skill package. Skills should never contain real SSNs. This indicates either
  leaked PII or a skill designed to process/store SSNs without appropriate safeguards. Source: https://github.com/promptguard/promptguard'
severity_default: critical
category: pii_exposure
audit_surface:
- instruction_file
- skill_md
asamm:
  primary: AI-06
  secondary:
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- markdown
- python
- bash
- javascript
- typescript
- text
- json
- yaml
patterns:
- (?<![0-9])(?!000|666|9\d{2})[0-8]\d{2}[- ](?!00)\d{2}[- ](?!0000)\d{4}(?![0-9])
exclude_patterns:
- (?i)example
- (?i)placeholder
- (?i)test
- (?i)dummy
- (?i)sample
- (?i)123-45-6789
- (?i)xxx-xx-xxxx
- (?i)format
- (?i)regex
- (?i)pattern
remediation: 'Remove all real SSNs from skill files. If the skill legitimately processes SSNs, ensure it uses tokenization
  or masking and never stores raw values.

  '
