agent_audit_id: cisco-pg.hardcoded_secrets.pg-secret-openai-key
title: OpenAI API key detected. OpenAI keys grant access to GPT models and can incur si
description: 'OpenAI API key detected. OpenAI keys grant access to GPT models and can incur significant costs if leaked. Not
  covered by Cisco''s core secret detection rules. Source: https://github.com/promptguard/promptguard'
severity_default: critical
category: hardcoded_secrets
audit_surface:
- instruction_file
- skill_md
- mcp_manifest
- plugin_manifest
asamm:
  primary: AI-06
  secondary:
  - AO-01
  mapping_confidence: category-default
  notes: Category-level default at import. Review per rule.
file_types:
- python
- bash
- markdown
- javascript
- typescript
- text
- json
- yaml
patterns:
- sk-[A-Za-z0-9]{20}T3BlbkFJ[A-Za-z0-9]{20}
- sk-proj-[A-Za-z0-9_-]{40,}
- sk-svcacct-[A-Za-z0-9_-]{40,}
exclude_patterns:
- (?i)example
- (?i)placeholder
- (?i)test
- (?i)your.?api.?key
- (?i)sk-xxxx
- sk-\.\.\.\.
remediation: 'Remove the hardcoded OpenAI key. Use the OPENAI_API_KEY environment variable instead. Rotate the exposed key
  at https://platform.openai.com/api-keys

  '
